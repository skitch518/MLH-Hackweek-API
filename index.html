<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stock Chart</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.1.1/dist/chartjs-chart-financial.min.js"></script>
</head>
<body>
  <div class="container">
    <h1>Stock Chart</h1>
    
    <div class="search-bar">
      <input type="text" id="ticker" placeholder="Enter ticker (e.g. AAPL)" />
      <button onclick="fetchChart()">Search</button>
    </div>
    
    <div id="error" class="error"></div>
    <div id="loading" class="loading hidden">Loading...</div>

    <div class="chart-toggle">
      <button class="active" onclick="setChartType('line', this)">Line</button>
      <button onclick="setChartType('candlestick', this)">Candlestick</button>
    </div>

    <canvas id="myChart"></canvas>

    <div class="timeframe-buttons">
      <button onclick="setTimeframe(5, this)">1W</button>
      <button onclick="setTimeframe(10, this)">2W</button>
      <button class="active" onclick="setTimeframe(30, this)">1M</button>
      <button onclick="setTimeframe(90, this)">3M</button>
    </div>
  
  </div>

  <script src="script.js"></script>
</body>
</html>
