<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stock Chart</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
  <div class="container">
    <h1>Stock Chart</h1>
    
    <div class="search-bar">
      <input type="text" id="ticker" placeholder="Enter ticker (e.g. AAPL)" />
      <button onclick="fetchChart()">Search</button>
    </div>
    
    <div id="error" class="error"></div>
    <div id="loading" class="loading hidden">Loading...</div>

    <div class="chart-toggle">
      <button class="active" onclick="setChartType('line')">Line</button>
      <button onclick="setChartType('candlestick')">Candlestick</button>
    </div>

    <canvas id="myChart"></canvas>

    <div class="timeframe-buttons">
      <button onclick="setTimeframe(5)">1W</button>
      <button onclick="setTimeframe(10)">2W</button>
      <button class="active" onclick="setTimeframe(30)">1M</button>
      <button onclick="setTimeframe(90)">3M</button>
    </div>
  
  </div>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.2.1/dist/chartjs-chart-financial.min.js"></script>

</body>


</html>
